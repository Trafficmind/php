name: Bug report
description: Report a reproducible SDK bug
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PHP version, SDK version, OS
    validations:
      required: true